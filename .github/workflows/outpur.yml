name: Flutter Linux Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y ninja-build libgtk-3-dev
    - name: Enable linux build
      run: flutter config --enable-linux-desktop
    - name: Build Flutter app for Linux
      run: flutter build linux --release
    - name: Compress release bundle
      run: |
        cd build/linux/x64/release/bundle
        zip -r ../../../../../linux-release-bundle.zip .
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: linux-release
        path: linux-release-bundle.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: linux-release
    - name: Create release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create v1.0.${{ github.run_number }} \
          --title "Release ${{ github.run_number }}" \
          --notes "Release of the build from the commit ${{ github.sha }}." \
          linux-release-bundle.zip