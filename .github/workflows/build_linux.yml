name: Flutter Linux Build

on:
  push:
    branches:
      - main  # یا هر شاخه دیگری که می‌خواهید روی آن اجرا شود

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # تغییر در این خط
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # یا 'beta' یا 'dev'
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: linux-build
          path: build/linux/x64/release/bundle

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/linux/x64/release/bundle/
          asset_name: linux-build.zip
          asset_content_type: application/zip
